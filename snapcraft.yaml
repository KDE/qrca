---
name: qrca
confinement: strict
grade: stable
base: core24
adopt-info: qrca
apps:
  qrca:
    extensions:
      - kde-neon-6
    common-id: org.kde.qrca
    desktop: usr/share/applications/org.kde.qrca.desktop
    command: usr/bin/qrca
    plugs:
      - camera
slots:
  session-dbus-interface:
    interface: dbus
    name: org.kde.qrca
    bus: session
parts:
  qrca:
    parse-info:
      - usr/share/metainfo/org.kde.qrca.appdata.xml
    plugin: cmake
    source: .
    source-type: local
    build-packages:
      - libpulse0
      - libnm-dev
      - gir1.2-glib-2.0
      - libxkbcommon-dev
    stage-packages:
      - libpulse0
      - libnm0
      - libxkbcommon0
    cmake-parameters:
      - -DCMAKE_INSTALL_PREFIX=/usr
      - -DCMAKE_BUILD_TYPE=Release
      - -DQT_MAJOR_VERSION=6
      - -DBUILD_WITH_QT6=ON
      - -DBUILD_TESTING=OFF
    prime:
      - -usr/lib/*/cmake/*
      - -usr/include/*
      - -usr/share/ECM/*
      - -usr/share/man/*
      - -usr/bin/X11
      - -usr/lib/gcc/$CRAFT_ARCH_TRIPLET_BUILD_FOR/6.0.0
      - -usr/lib/aspell/*
      - -usr/share/lintian
  cleanup:
    after:
      - qrca
    plugin: nil
    build-snaps:
      - core24
      - kf6-core24
    override-prime: |
      set -eux
        for snap in "core24" "kf6-core24"; do
          cd "/snap/$snap/current" && find . -type f,l -exec rm -rf "${CRAFT_PRIME}/{}" \;
        done
